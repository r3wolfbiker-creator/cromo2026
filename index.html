<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Cromos Panini 2026</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0f0f12;
            color: #eeeeee;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            display: flex;
            flex-direction: row;
            gap: 30px;
            background-color: #16161a;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            max-width: 950px;
            width: 100%;
        }
        .form-section, .preview-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
        }
        .preview-section { 
            border-left: 1px solid #2a2a35; 
            padding-left: 30px; 
            align-items: center; 
            justify-content: flex-start; 
        }
        h2 { color: #ffcc00; margin-top: 0; margin-bottom: 20px; font-size: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .form-row .form-group { flex: 1; margin-bottom: 0; }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: #aaaaaa; font-weight: 600; }
        input[type="text"], input[type="file"] {
            width: 100%; padding: 11px 14px; border: 1px solid #333344;
            border-radius: 8px; background-color: #202026; color: #ffffff; box-sizing: border-box;
            font-size: 14px;
        }
        input:focus { border-color: #ffcc00; outline: none; background-color: #25252e; }
        button {
            width: 100%; padding: 14px; border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer; background-color: #ffcc00; color: #121212;
            transition: all 0.3s ease; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        button:hover { background-color: #e6b800; transform: translateY(-1px); }
        .btn-download {
            background-color: #00cc66; color: #ffffff; display: none; margin-top: 20px;
            text-decoration: none; text-align: center; width: 100%; padding: 14px; border-radius: 8px; font-weight: bold;
            font-size: 16px; transition: background 0.2s; box-sizing: border-box;
        }
        .btn-download:hover { background-color: #00a352; }
        
        .result-box {
            width: 100%; min-height: 480px; border: 2px dashed #333344; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; background-color: #1a1a24; overflow: hidden;
            position: relative;
        }
        #resultImage { max-width: 100%; max-height: 520px; display: block; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .loader {
            display: none; border: 4px solid #222230; border-top: 4px solid #ffcc00;
            border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite;
            position: absolute; z-index: 10;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .status-badge {
            color: #00cc66; font-weight: bold; font-size: 13px; padding: 10px; 
            background: #14291e; border-radius: 6px; border: 1px solid #1f422f; display: inline-block; width: 100%; box-sizing: border-box;
        }
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .preview-section { border-left: none; padding-left: 0; padding-top: 25px; border-top: 1px solid #2a2a35; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="form-section">
        <h2>Diseño de Cromo 2026</h2>
        
        <form id="aiCromoForm">
            <div class="form-group">
                <label>1. Plantilla de Fondo de Cromo (Imagen 1):</label>
                <div class="status-badge">
                    ✓ IMAGEN 1 Vinculada y bloqueada en la memoria del sistema
                </div>
            </div>

            <div class="form-group">
                <label for="fullName">Nombre del Jugador:</label>
                <input type="text" id="fullName" value="ALEX CONDE" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="birthDate">Fecha de Nacimiento:</label>
                    <input type="text" id="birthDate" value="08/02/1991" placeholder="DD/MM/AAAA" required>
                </div>
                <div class="form-group">
                    <label for="height">Estatura:</label>
                    <input type="text" id="height" value="1,75 m" placeholder="Ej: 1,75 m" required>
                </div>
                <div class="form-group">
                    <label for="weight">Peso:</label>
                    <input type="text" id="weight" value="80 kg" placeholder="Ej: 80 kg" required>
                </div>
            </div>

            <div class="form-group">
                <label for="team">País / Equipo:</label>
                <input type="text" id="team" value="COLOMBIA" required>
            </div>

            <div class="form-group">
                <label for="userImage">2. Sube la Foto de Perfil (IMAGEN 2):</label>
                <input type="file" id="userImage" accept="image/*" required>
            </div>

            <button type="submit" id="btnSubmit">Generar Cromo de Alta Calidad</button>
        </form>
    </div>

    <div class="preview-section">
        <div class="result-box" id="resultBox">
            <div class="loader" id="loader"></div>
            <span id="placeholderText" style="color: #888899; text-align: center; padding: 20px; font-size: 14px; display: none;">La foto de perfil se fusionará dinámicamente con tu plantilla oficial...</span>
            <img id="resultImage" alt="Vista Previa de Plantilla">
        </div>
        <a id="downloadBtn" class="btn-download" href="#" download="mi_cromo_panini_2026.png">Descargar Cromo Oficial</a>
    </div>
</div>

<script>
    // Se usa la constante base64 provista para el fondo base
    const IMAGEN_1_BASE64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAA/YAAAKYCAYAAADZkWPKAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAP+lSURBVHhe7P13vG1HcecNf3vtfW4OugpXOSckgRCSQAhEzsYm2xhsY9kGx3Ga4Ame+Yzt1zN+Z97nGXv8jD0ORCc8xuAANn5sDJhggwkSIkuAEihd5ZvP2Xv1+0dVrVW7dq+dzrkKcOp+zt1rdaiuX3evDtXV3Wn//v2ZdVqndVqndVqndVqndVqndVqnRzht27aNKjqu0zqt0zqt0zqt0zqt0zqt0zqt0zqt06OH1if267RO67RO67RO67RO67RO67RO67RO6/QopvWJ/Tqt0zqt0zqt0zqt0zqt0zqt0zo9iml9Yr9O67RO67RO67RO67RO67RO67RO6/QopvWJ/Tqt0zqt0zqt0zqt0zqt0zqt0zo9iml9Yr9O67RO67RO67RO67RO67RO67RO6/Qop4mn4r/y1CcDkHMmpUWilZrnnOWWvOhWkxkCCejT+pm/vnvy/XHpGK7mmqip64WK+GM9TSUZ7Xsk1dc4spUSila2LIgYfPicY5gwpUVsaqjGpSJBrUqpICXIex0YBRwyTc6aqqjEZU0oMck0N9Cw95xfx12TqlERexV8BKY3z9jQJf8lt6OpAlTO9VJEUtLii7/v5u/DXyqsO+BuUE8qtJKM914rf8jimH2le/JPi2runGDeGyRPKP7oZlWS054cafy8l+qmCAv6h1slvZvw+bsRGIf0Y5kjgTzlTpUQWx04+FDAkbcwqoK9tR5csMW7EBtKGDnImW7uZoVpj/EOVV/DXkAW3tYnkPNaGGkUMkXd0y9r+rbb/y2RpAxU/GqYCEknKb0b89jzU/qqn7XL0L1HEEHkv55p+SqQCixh3Ov7MsoZZ0rLIC5Z/nTOZTLY+z8WRfmn1/X/JzdNKriElllKCKf3/QMs7q2w9LedF8UcZ7XlZxz+ShtSjFR1HQDt2Mym78Pu2eyQNi1eIOwm/UQyz1vjX2/9R/P2UqIpsMgNtf76Z8U/iQwFD5BfdJsWN2C";

    const form = document.getElementById('aiCromoForm');
    const loader = document.getElementById('loader');
    const resultImage = document.getElementById('resultImage');
    const downloadBtn = document.getElementById('downloadBtn');

    window.addEventListener('DOMContentLoaded', () => {
        resultImage.src = IMAGEN_1_BASE64;
    });

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        loader.style.display = 'block';
        resultImage.style.opacity = "0.3";
        downloadBtn.style.display = 'none';

        const fullName = document.getElementById('fullName').value.toUpperCase();
        const birth = document.getElementById('birthDate').value.trim();
        const height = document.getElementById('height').value.trim();
        const weight = document.getElementById('weight').value.trim();
        const teamName = document.getElementById('team').value.toUpperCase();
        const userFileInput = document.getElementById('userImage').files[0];

        if (!userFileInput) {
            alert("Por favor selecciona una foto de perfil.");
            loader.style.display = 'none';
            resultImage.style.opacity = "1";
            return;
        }

        try {
            // Instanciar imágenes en elementos HTML en memoria para procesar en Canvas
            const imgFondo = new Image();
            imgFondo.src = IMAGEN_1_BASE64;
            await new Promise(r => imgFondo.onload = r);

            const userBase64 = await convertFileToBase64(userFileInput);
            const imgUsuario = new Image();
            imgUsuario.src = userBase64;
            await new Promise(r => imgUsuario.onload = r);

            // Crear Canvas con las dimensiones nativas de la plantilla de fondo
            const canvas = document.createElement('canvas');
            canvas.width = imgFondo.width;
            canvas.height = imgFondo.height;
            const ctx = canvas.getContext('2d');

            // 1. Dibujar el fondo base del cromo
            ctx.drawImage(imgFondo, 0, 0);

            // 2. Dibujar la foto del usuario redimensionada en el área del jugador
            // Ajusta estas coordenadas (X, Y, Ancho, Alto) según el diseño exacto de tu cromo
            const xJugador = canvas.width * 0.15;
            const yJugador = canvas.height * 0.18;
            const anchoJugador = canvas.width * 0.45;
            const altoJugador = canvas.height * 0.50;
            ctx.drawImage(imgUsuario, xJugador, yJugador, anchoJugador, altoJugador);

            // 3. Renderizar los textos personalizados encima del diseño
            ctx.fillStyle = "#ffffff";
            ctx.textAlign = "center";

            // Nombre del Jugador
            ctx.font = "bold 28px 'Segoe UI', Arial, sans-serif";
            ctx.fillText(fullName, canvas.width * 0.72, canvas.height * 0.42);

            // Detalles físicos (Fecha / Estatura / Peso)
            ctx.font = "18px 'Segoe UI', Arial, sans-serif";
            ctx.fillStyle = "#121212";
            const infoSpecs = `${birth} | ${height} | ${weight}`;
            ctx.fillText(infoSpecs, canvas.width * 0.72, canvas.height * 0.55);

            // País o Club
            ctx.font = "bold 20px 'Segoe UI', Arial, sans-serif";
            ctx.fillStyle = "#ffffff";
            ctx.fillText(teamName, canvas.width * 0.72, canvas.height * 0.68);

            // Extraer el resultado en formato de imagen estructurada
            const resultadoUrl = canvas.toDataURL('image/png');

            loader.style.display = 'none';
            resultImage.style.opacity = "1";
            resultImage.src = resultadoUrl;

            downloadBtn.href = resultadoUrl;
            downloadBtn.style.display = 'block';

        } catch (error) {
            loader.style.display = 'none';
            resultImage.style.opacity = "1";
            resultImage.src = IMAGEN_1_BASE64;
            alert(`Error al estructurar el cromo: ${error.message}`);
        }
    });

    function convertFileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }
</script>

</body>
</html>
